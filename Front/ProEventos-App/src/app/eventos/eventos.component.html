<h2>Eventos</h2>
<hr>
<form action="" class="form-inline">
    <div class="form-group mb-3">
        <label  class="mr-2"><h4>Filtro: </h4></label>
        <input type="text" class="form control" placeholder="buscar"
        [(ngModel)]="filtroLista" name="filtro">       
    </div>
</form>
<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th><button type="button" class="btn btn-outline-light btn-sm"
                (click)="mostrarImagem = !mostrarImagem">{{mostrarImagem ? 'Ocultar' : 'Mostrar'}}</button></th>
            <th>#</th>
            <th>Tema</th>
            <th>Local</th>
            <th>Data</th>
            <th>Participantes</th>
            <th>Lote</th>
            <th>Opções</th>
        </tr>
    </thead>
    <tbody *ngIf="eventos && eventos.length">
        <tr *ngFor="let evento of eventosFiltrados">
            <td>
                <img 
                [collapse]="!mostrarImagem" [isAnimated]="true" src="/assets/img/{{evento.imagemURL}}"
                [style.width.px]="imgLarg" 
                [style.margin.px]="imgAlt">
            </td>
            <td>{{evento.eventoId}}</td>
            <td>{{evento.tema}}</td>
            <td>{{evento.local}}</td>
            <td>{{evento.dataEvento}}</td>
            <td>{{evento.qtdPessoas}}</td>
            <td>{{evento.lote}}</td>
            <td>               
                <button class="btn btn-outline-primary btn-sm">editar</button>
                <button class="btn btn-outline-danger btn-sm m-lg-1">excluir</button>                
            </td>
        </tr>
    </tbody>
    <tfoot *ngIf="!eventos.length">
        <tr>
            <td colspan="8" class="text-center">
                <h4>Nenhum evento encontrado</h4>
            </td>
        </tr>
    </tfoot>
</table>
